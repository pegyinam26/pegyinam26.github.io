<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>G & G's Steakhouse</title>
    <!--kit from Font Awesome-->
    <script src="https://kit.fontawesome.com/1e9c4867e3.js" crossorigin="anonymous"></script>
    <!--    external css link - Google fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
    <!-- BOOTSTRAP CSS CDN LINK  -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="cart-page">

<!-- NAVBAR (copy from other pages) -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <a class="navbar-brand d-flex align-items-center" href="index.html">
        <img src="images/logo-image.png" width="40" class="me-2">
        G & G's Steakhouse
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav  ms-auto justify-content-end w-100">
            <li class="nav-item">
                <!--USING FONT AWESOME ON RESERVATIONS PAGE-->
                <a class="nav-link" href="index.html">
                    <i class="fas fa-home"></i>
                    Home</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="menu.html">
                    <i class="fa fa-bars"></i>
                    Menu</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="reservations.html">
                    <i class="fas fa-calendar-check"></i>
                    Reservations</a>
            </li>
            <li class="nav-item d-flex justify-content-start gap-2">
                <a class="nav-link position-relative" href="cart.html">
                    <i class="fas fa-shopping-cart"></i>
                    Cart
                    <span id="cart-count"
                          class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-success text-white">
                            0
                        </span>
                </a>
            </li>
        </ul>
    </div>
</nav>
<div class="main-content">
    <!--CONFIGURING CART BODY-->
    <div class="cart-hero">
        <h1>Review your menu selections...</h1>
    </div>
    <div class="container mt-5">
        <div id="cart-container"></div>

        <div class="mt-4">
            <button class="btn btn-danger" id="cancel-order">Cancel Order</button>
            <button class="btn btn-success" id="submit-order">Submit Order</button>

        </div>
    </div>

    <!-- MODALS -->
    <div class="modal fade" id="cancelModal">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-body">
                    Are you sure you want to cancel your order?
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">No</button>
                    <button class="btn btn-danger" id="confirmCancel">Yes</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="thankYouModal">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-body">
                    Thank you for your order!
                </div>
            </div>
        </div>
    </div>
    <div class="modal fade" id="No-thankYouModal">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-body">
                    Your Cart is empty!
                </div>
            </div>
        </div>
    </div>
    <div class="modal fade" id="CanceledModal">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-body">
                    Thank you. You have canceled your order!
                </div>
            </div>
        </div>
    </div>
</div>
<!-- FOOTER SECTION TO DISPLAY COPYRIGHTS-->
<footer>
    <p>© 2026 G & G's Bulldog Incorporated  | All Rights Reserved</p>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
